name: Build and Release Firmware

on:
  push:
    branches: [master]
    tags:
      - 'v*'
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 core
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@2.0.17

      - name: Install libraries
        run: |
          arduino-cli lib install "ArduinoJson@6.19.0"
          # Download EPD47 library
          mkdir -p ~/Arduino/libraries
          curl -L https://github.com/DFRobotdl/EPD47/archive/refs/heads/master.zip -o /tmp/epd47.zip
          unzip /tmp/epd47.zip -d ~/Arduino/libraries/

      - name: Prepare sketch folder
        run: |
          mkdir -p ~/Arduino/LilyGo-EPD-4-7-WeatherAPI-Touch
          cp -r ./* ~/Arduino/LilyGo-EPD-4-7-WeatherAPI-Touch/ 2>/dev/null || true
          cp -r ./*.ino ./*.h ./*.cpp ~/Arduino/LilyGo-EPD-4-7-WeatherAPI-Touch/ 2>/dev/null || true

      - name: Compile firmware
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32s3:CDCOnBoot=cdc,FlashSize=16M,PartitionScheme=fatflash,PSRAM=opi \
            --output-dir ./build \
            --warnings none \
            ~/Arduino/LilyGo-EPD-4-7-WeatherAPI-Touch

      - name: Rename firmware
        run: |
          mv ./build/LilyGo-EPD-4-7-WeatherAPI-Touch.ino.bin ./build/weather-station-firmware.bin
          mv ./build/LilyGo-EPD-4-7-WeatherAPI-Touch.ino.bootloader.bin ./build/bootloader.bin 2>/dev/null || true
          mv ./build/LilyGo-EPD-4-7-WeatherAPI-Touch.ino.partitions.bin ./build/partitions.bin 2>/dev/null || true

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            ./build/weather-station-firmware.bin
            ./build/bootloader.bin
            ./build/partitions.bin
          if-no-files-found: error

      - name: Copy firmware to docs for web flasher
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p docs/firmware
          cp ./build/weather-station-firmware.bin docs/firmware/
          cp ./build/bootloader.bin docs/firmware/ 2>/dev/null || true
          cp ./build/partitions.bin docs/firmware/ 2>/dev/null || true

      - name: Update manifest version
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=$(git describe --tags --always)
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" docs/manifest.json

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./build/weather-station-firmware.bin
            ./build/bootloader.bin
            ./build/partitions.bin
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
