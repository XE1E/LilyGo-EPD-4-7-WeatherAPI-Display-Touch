name: Build and Release Firmware

on:
  push:
    branches: [master]
    tags:
      - 'v*'
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 core
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@2.0.17

      - name: Install libraries
        run: |
          arduino-cli lib install "ArduinoJson@6.19.0"
          # Download EPD47 library
          mkdir -p ~/Arduino/libraries
          curl -L https://github.com/DFRobotdl/EPD47/archive/refs/heads/master.zip -o /tmp/epd47.zip
          unzip /tmp/epd47.zip -d ~/Arduino/libraries/

      - name: Prepare sketch folder
        run: |
          mkdir -p ~/Arduino/LilyGo-EPD-4-7-WeatherAPI-Display-Touch
          cp -r ./* ~/Arduino/LilyGo-EPD-4-7-WeatherAPI-Display-Touch/ 2>/dev/null || true
          cp -r ./*.ino ./*.h ./*.cpp ~/Arduino/LilyGo-EPD-4-7-WeatherAPI-Display-Touch/ 2>/dev/null || true

      - name: Compile firmware
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32s3:CDCOnBoot=cdc,FlashSize=16M,PartitionScheme=app3M_fat9M_16MB,PSRAM=opi \
            --output-dir ./build \
            --warnings none \
            ~/Arduino/LilyGo-EPD-4-7-WeatherAPI-Display-Touch

      - name: Rename firmware
        run: |
          mv ./build/LilyGo-EPD-4-7-WeatherAPI-Display-Touch.ino.bin ./build/weather-station-firmware.bin
          mv ./build/LilyGo-EPD-4-7-WeatherAPI-Display-Touch.ino.bootloader.bin ./build/bootloader.bin 2>/dev/null || true
          mv ./build/LilyGo-EPD-4-7-WeatherAPI-Display-Touch.ino.partitions.bin ./build/partitions.bin 2>/dev/null || true

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            ./build/weather-station-firmware.bin
            ./build/bootloader.bin
            ./build/partitions.bin
          if-no-files-found: error

      - name: Copy firmware to docs for web flasher
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p docs/firmware
          cp ./build/weather-station-firmware.bin docs/firmware/
          cp ./build/bootloader.bin docs/firmware/ 2>/dev/null || true
          cp ./build/partitions.bin docs/firmware/ 2>/dev/null || true

      - name: Update manifest version
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
        run: |
          # Derive version from the firmware source of truth (e.g. "2.9 / 4.7in" -> "v2.9").
          # Falls back to git describe if the pattern isn't found.
          NUM=$(sed -n 's/.*String version[[:space:]]*=[[:space:]]*"\([0-9][0-9.]*\).*/\1/p' LilyGo-EPD-4-7-WeatherAPI-Display-Touch.ino | head -1)
          if [ -n "$NUM" ]; then
            VERSION="v$NUM"
          else
            VERSION=$(git describe --tags --always)
          fi
          echo "manifest version -> $VERSION"
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" docs/manifest.json

      - name: Commit firmware to docs folder
        if: github.ref == 'refs/heads/master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No firmware changes to commit."
            exit 0
          fi
          git commit -m "Update firmware binaries [skip ci]"
          # Retry push, rebasing onto any concurrent pushes.
          # On a binary conflict, -X theirs keeps our freshly built artifacts
          # (during rebase "theirs" = the commit being replayed, i.e. ours).
          attempt=0
          max=5
          until git push; do
            attempt=$((attempt + 1))
            if [ "$attempt" -ge "$max" ]; then
              echo "::error::Push failed after $max attempts."
              exit 1
            fi
            echo "Push rejected; rebasing onto origin/master (attempt $attempt/$max)..."
            git pull --rebase -X theirs origin master
          done
          echo "Firmware binaries pushed."

      - name: Extract changelog for release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Extracting changelog section for version $VERSION"
          awk -v ver="$VERSION" '
            index($0, "## [" ver "]")==1 {flag=1; next}
            flag && index($0, "## [")==1 {exit}
            flag {print}
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "No se encontró una sección en CHANGELOG.md para la versión $VERSION." > release_notes.md
          fi
          echo "--- release_notes.md ---"
          cat release_notes.md

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./build/weather-station-firmware.bin
            ./build/bootloader.bin
            ./build/partitions.bin
          body_path: release_notes.md
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
